syntax = "proto3";

package metalbroker.service.auth;

import "google/protobuf/timestamp.proto";
import "metalbroker/service/common/Common.proto";

option java_package = "com.hugoserve.metalbroker.proto.auth";
option java_multiple_files = true;

// ---------- REQUESTS ----------

message LoginRequest {
  string email = 1;
  string password = 2;
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string first_name = 3;
  string last_name = 4;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message LogoutRequest {
  string refresh_token = 1;
}

// ---------- RESPONSES ----------

message TokenPair {
  string access_token = 1;
  string refresh_token = 2;
  google.protobuf.Timestamp access_expires_at = 3;
  google.protobuf.Timestamp refresh_expires_at = 4;
}

message AuthResponse {
  bool success = 1;
  string message = 2;
  metalbroker.service.common.UserRole role = 3;
  TokenPair tokens = 4;
}
