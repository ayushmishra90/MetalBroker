syntax = "proto3";

package metalbroker.service.auth;

option java_multiple_files = true;
option java_package = "com.hugoserve.metalbroker.service.proto.auth";

enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER = 1;
  ADMIN = 2;
}

message UserEntity {
  int64 id = 1;
  string email = 2;
  UserRole role = 3;
}
