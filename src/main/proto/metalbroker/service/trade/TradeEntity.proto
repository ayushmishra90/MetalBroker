syntax = "proto3";

package metalbroker.service.trade;

import "google/protobuf/timestamp.proto";

option java_package = "com.hugoserve.metalbroker.service.proto.trade";
option java_multiple_files = true;

message TradeEntity {
  int64 id = 1;
  int64 user_id = 2;
  string type = 3;          // BUY / SELL
  string metal = 4;         // XAU, XAG
  double quantity = 5;
  double executed_price = 6;
  double total_amount = 7;
  google.protobuf.Timestamp executed_at_utc = 8;
}
